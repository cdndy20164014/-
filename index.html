<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>征途榮耀官方儲值中心</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f1116;
  color:#fff;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:30px;
}
h1{
  color:#ffd700;
}
.section{
  background:#1a1f2a;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}
.card{
  background:#222836;
  padding:15px;
  border-radius:10px;
}
.card h3{
  margin:5px 0;
}
.price{
  font-size:20px;
  color:#ffd700;
}
.reward{
  font-size:14px;
  margin-top:5px;
  color:#ccc;
}
.btn{
  width:100%;
  padding:10px;
  background:linear-gradient(45deg,#ffd700,#ffae00);
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}
input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}
.progress{
  height:20px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}
.bar{
  height:100%;
  background:gold;
  width:0%;
}
.reward-item{
  margin:5px 0;
}
.record-item{
  font-size:14px;
  margin:4px 0;
  color:#ccc;
}
@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="container">

<h1>🔥 征途榮耀官方儲值中心</h1>

<div class="section">
<h2>帳號資訊</h2>
<input id="account" placeholder="請輸入帳號 (Email)">
<input id="role" placeholder="請輸入角色名稱">
<input id="bankLast5" placeholder="請輸入匯款帳號後5碼">
</div>

<div class="section">
<h2>💰 金額儲值</h2>
<div class="grid" id="amountGrid"></div>
</div>

<div class="section">
<h2>🎁 累積儲值</h2>
<div>目前累計：<span id="total">0</span></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="rewardList"></div>
</div>

<div class="section">
<h2>📜 最新儲值紀錄</h2>
<div id="recordList"></div>
</div>

</div>

<script>

const API_URL = "你的AppsScript網址";

let selectedAmountData = null;

// ========================
// 載入金額選項
// ========================
function loadAmounts(){
  fetch(API_URL + "?type=amounts")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(item=>{
      html+=`
      <div class="card">
        <h3>${item.name}</h3>
        <div class="price">${item.amount} 元</div>
        <div class="reward">獲得：${item.reward}</div>
        <button class="btn"
          onclick='selectAmount(${JSON.stringify(item)})'>
          選擇此方案
        </button>
      </div>
      `;
    });
    document.getElementById("amountGrid").innerHTML = html;
  });
}

// ========================
// 選擇金額
// ========================
function selectAmount(item){
  selectedAmountData = item;
  alert("已選擇："+item.name+"\n獲得："+item.reward);
}

// ========================
// 送出訂單
// ========================
function submitOrder(){

  const account = document.getElementById("account").value;
  const role = document.getElementById("role").value;
  const bankLast5 = document.getElementById("bankLast5").value;

  if(!selectedAmountData){
    alert("請先選擇儲值金額");
    return;
  }

  if(!account || !role || !bankLast5){
    alert("請填寫完整資訊");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      amountId:selectedAmountData.id,
      account:account,
      role:role,
      bankLast5:bankLast5
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      alert("訂單建立成功\n訂單編號："+data.orderId);
      loadAll();
    }else{
      alert(data);
    }
  });
}

// ========================
// 累積儲值
// ========================
function loadTotal(){
  const acc = document.getElementById("account").value;
  if(!acc) return;

  fetch(API_URL+"?type=total&account="+acc)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("total").innerText = data.total;
    document.getElementById("bar").style.width =
      Math.min(data.total/50000*100,100)+"%";

    let html="";
    data.rewards.forEach(r=>{
      html+=`<div class="reward-item">
        ${r.amount} - ${r.reward}
        ${r.reached?" ✅":" ❌"}
      </div>`;
    });
    document.getElementById("rewardList").innerHTML = html;
  });
}

// ========================
// 最新儲值紀錄
// ========================
function loadRecords(){
  fetch(API_URL+"?type=records")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(r=>{
      html+=`<div class="record-item">
        金額：${r.amount} ｜ 狀態：${r.status}
      </div>`;
    });
    document.getElementById("recordList").innerHTML = html;
  });
}

// ========================
// 初始化
// ========================
function loadAll(){
  loadAmounts();
  loadTotal();
  loadRecords();
}

loadAll();

// 監聽帳號輸入即時更新累積
document.getElementById("account")
  .addEventListener("blur",loadTotal);

</script>

</body>
</html>
